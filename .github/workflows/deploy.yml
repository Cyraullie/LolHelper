name: Deploy Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          set -ex
          mkdir -p $HOME/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > $HOME/.ssh/id_ed25519
          chmod 600 $HOME/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.PORT }} -H ${{ secrets.HOST }} >> $HOME/.ssh/known_hosts

      - name : Deploy
        run: |
          ssh -p ${{ secrets.PORT }} ${{ secrets.USER }}@${{ secrets.HOST }} "
            cd ~/Projects/LolHelper &&
            git pull origin main &&
            source venv/bin/activate && 
            sudo systemctl restart lolhelper 
          "